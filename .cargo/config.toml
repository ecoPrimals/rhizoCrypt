# Local build configuration.
#
# target-dir is intentionally NOT set here — use the CARGO_TARGET_DIR env var
# if your global target-dir is on a noexec mount (common with NFS/FUSE/encrypted
# volumes). CI uses CARGO_TARGET_DIR; developers can set it in .cargo/config.local.toml
# or their shell profile.
[build]
jobs = 16
