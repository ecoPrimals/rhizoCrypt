[[bin]]
name = "rhizocrypt-service"
path = "src/main.rs"

[dependencies]
rhizo-crypt-core = { path = "../rhizo-crypt-core" }
rhizo-crypt-rpc = { path = "../rhizo-crypt-rpc" }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

