# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for rhizoCrypt
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # Transitive dependencies from tarpc 0.37; tracked for upstream resolution.
    # RUSTSEC-2024-0384 (instant) and RUSTSEC-2025-0057 (fxhash) resolved upstream.
    { id = "RUSTSEC-2025-0141", reason = "bincode v1 is transitive via tarpc → tokio-serde; awaiting bincode v2 migration" },
    { id = "RUSTSEC-2026-0007", reason = "opentelemetry_sdk is transitive via tarpc → tracing-opentelemetry" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "AGPL-3.0-or-later",
    "AGPL-3.0-only",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

# ecoBin compliance: these C-backed crates are banned from default features.
# They may appear when `http-clients` or `live-clients` opt-in features are
# enabled (reqwest → rustls → ring).  Once rustls-rustcrypto reaches stable,
# we will migrate to a fully pure-Rust TLS stack.
deny = [
    # ecoBin v3.0 full C-sys ban list (14 canonical + ecosystem extras)
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl-src", wrappers = [] },
    { crate = "native-tls", wrappers = [] },
    { crate = "aws-lc-sys", wrappers = [] },
    { crate = "cmake", wrappers = [] },
    { crate = "cc", wrappers = ["ring", "blake3"] },
    { crate = "bindgen", wrappers = [] },
    { crate = "bzip2-sys", wrappers = [] },
    { crate = "curl-sys", wrappers = [] },
    { crate = "libz-sys", wrappers = [] },
    { crate = "pkg-config", wrappers = ["ring"] },
    { crate = "vcpkg", wrappers = [] },
    { crate = "zstd-sys", wrappers = [] },
    { crate = "lz4-sys", wrappers = [] },
    { crate = "libsqlite3-sys", wrappers = [] },
    { crate = "cryptoki-sys", wrappers = [] },
]
# ring is tolerated only via the optional http-clients feature (reqwest → rustls → ring).
# Default builds (ecoBin-compliant) have zero C application dependencies.
# Evolution: migrate to rustls-rustcrypto when it reaches stable, then ban ring too.
# Evolution: tarpc transitive deps (bincode v1, opentelemetry_sdk) tracked upstream.
#   instant + fxhash resolved as of tarpc 0.37 dependency updates.
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
