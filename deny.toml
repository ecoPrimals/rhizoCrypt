# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for rhizoCrypt
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
yanked = "deny"
ignore = [
    # Transitive dependencies from tarpc 0.37; tracked for upstream resolution.
    # RUSTSEC-2024-0384 (instant), RUSTSEC-2025-0057 (fxhash), RUSTSEC-2026-0007 (opentelemetry_sdk)
    # all resolved via cargo update as of 2026-04-15.
    { id = "RUSTSEC-2025-0141", reason = "bincode v1 is transitive via tarpc → tokio-serde; awaiting bincode v2 migration" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "BSL-1.0",
    "AGPL-3.0-or-later",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ecoBin compliance: these C-backed crates are banned.
# reqwest removed in session 27 — all HTTP clients use hyper/tower (pure Rust).
deny = [
    # ecoBin v3.0 full C-sys ban list (14 canonical + ecosystem extras)
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl-src", wrappers = [] },
    { crate = "native-tls", wrappers = [] },
    { crate = "aws-lc-sys", wrappers = [] },
    { crate = "cmake", wrappers = [] },
    { crate = "cc", wrappers = ["blake3"] },
    { crate = "bindgen", wrappers = [] },
    { crate = "bzip2-sys", wrappers = [] },
    { crate = "curl-sys", wrappers = [] },
    { crate = "libz-sys", wrappers = [] },
    { crate = "pkg-config", wrappers = [] },
    { crate = "vcpkg", wrappers = [] },
    { crate = "zstd-sys", wrappers = [] },
    { crate = "lz4-sys", wrappers = [] },
    { crate = "libsqlite3-sys", wrappers = [] },
    { crate = "cryptoki-sys", wrappers = [] },
    { crate = "ring", wrappers = [] },
    { crate = "reqwest", wrappers = [] },
]
# Evolution: migrate to rustls-rustcrypto when it reaches stable, then ban ring too.
# Evolution: tarpc transitive dep (bincode v1) tracked upstream; awaiting bincode v2 migration.
#   instant, fxhash, opentelemetry_sdk resolved as of 2026-04-15 cargo update.
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
