# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for rhizoCrypt
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
ignore = [
    # Transitive dependencies from tarpc 0.37; tracked for upstream resolution
    { id = "RUSTSEC-2024-0384", reason = "instant is a transitive dep from tarpc" },
    { id = "RUSTSEC-2025-0057", reason = "fxhash is a transitive dep from tarpc" },
    { id = "RUSTSEC-2025-0141", reason = "bincode v1 is a transitive dep from tarpc" },
    { id = "RUSTSEC-2026-0007", reason = "opentelemetry_sdk is a transitive dep from tarpc" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "AGPL-3.0-or-later",
    "AGPL-3.0-only",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

# ecoBin compliance: these C-backed crates are banned from default features.
# They may appear when `http-clients` or `live-clients` opt-in features are
# enabled (reqwest → rustls → ring).  Once rustls-rustcrypto reaches stable,
# we will migrate to a fully pure-Rust TLS stack.
deny = [
    { crate = "openssl-sys", wrappers = [] },
    { crate = "native-tls", wrappers = [] },
    { crate = "aws-lc-sys", wrappers = [] },
    { crate = "zstd-sys", wrappers = [] },
    { crate = "lz4-sys", wrappers = [] },
    { crate = "libsqlite3-sys", wrappers = [] },
    { crate = "cryptoki-sys", wrappers = [] },
]
# ring is tolerated only via the optional http-clients feature (reqwest → rustls → ring).
# Default builds (ecoBin-compliant) have zero C application dependencies.
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
