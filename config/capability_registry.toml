# SPDX-License-Identifier: AGPL-3.0-or-later
# rhizoCrypt capability registry — biomeOS ephemeral DAG primal.
#
# Declares the capabilities this primal registers with Songbird for
# capability-based discovery. Self-knowledge only: no references to
# other primals' capabilities.

[primal]
name = "rhizocrypt"
version = "0.14.17"
domain = "dag"
stability = "stable"
license = "AGPL-3.0-or-later"
description = "Ephemeral content-addressed DAG engine for session-scoped working memory"

# ── Session lifecycle ──────────────────────────────────────────────

[capabilities.session_create]
method = "dag.session.create"
domain = "dag.session"
stability = "stable"
description = "Create a scoped DAG session with lifecycle management"

[capabilities.session_get]
method = "dag.session.get"
domain = "dag.session"
stability = "stable"
description = "Retrieve session metadata by ID"

[capabilities.session_list]
method = "dag.session.list"
domain = "dag.session"
stability = "stable"
description = "List all active sessions"

[capabilities.session_discard]
method = "dag.session.discard"
domain = "dag.session"
stability = "stable"
description = "Discard and clean up a session"

# ── Vertex operations ──────────────────────────────────────────────

[capabilities.event_append]
method = "dag.event.append"
domain = "dag.event"
stability = "stable"
description = "Append a content-addressed vertex to a session DAG"

[capabilities.event_append_batch]
method = "dag.event.append_batch"
domain = "dag.event"
stability = "stable"
description = "Append multiple vertices in a single batch operation"

[capabilities.vertex_get]
method = "dag.vertex.get"
domain = "dag.vertex"
stability = "stable"
description = "Retrieve a vertex by session and vertex ID"

[capabilities.vertex_query]
method = "dag.vertex.query"
domain = "dag.vertex"
stability = "stable"
description = "Query vertices with optional type, agent, and limit filters"

[capabilities.vertex_children]
method = "dag.vertex.children"
domain = "dag.vertex"
stability = "stable"
description = "Get child vertices of a given vertex"

[capabilities.frontier_get]
method = "dag.frontier.get"
domain = "dag.frontier"
stability = "stable"
description = "Get the frontier (leaf vertices) of a session DAG"

[capabilities.genesis_get]
method = "dag.genesis.get"
domain = "dag.genesis"
stability = "stable"
description = "Get the genesis (root) vertices of a session DAG"

# ── Merkle integrity ──────────────────────────────────────────────

[capabilities.merkle_root]
method = "dag.merkle.root"
domain = "dag.merkle"
stability = "stable"
description = "Compute the Merkle root of a session's vertex set"

[capabilities.merkle_proof]
method = "dag.merkle.proof"
domain = "dag.merkle"
stability = "stable"
description = "Generate an inclusion proof for a vertex"

[capabilities.merkle_verify]
method = "dag.merkle.verify"
domain = "dag.merkle"
stability = "stable"
description = "Verify a Merkle inclusion proof"

# ── Slice operations ──────────────────────────────────────────────

[capabilities.slice_checkout]
method = "dag.slice.checkout"
domain = "dag.slice"
stability = "stable"
description = "Checkout an immutable slice from permanent storage"

[capabilities.slice_get]
method = "dag.slice.get"
domain = "dag.slice"
stability = "stable"
description = "Retrieve slice metadata by ID"

[capabilities.slice_list]
method = "dag.slice.list"
domain = "dag.slice"
stability = "stable"
description = "List all active slices"

[capabilities.slice_resolve]
method = "dag.slice.resolve"
domain = "dag.slice"
stability = "stable"
description = "Resolve a slice to its underlying session data"

# ── Branch / Diff / Merge / Federate (Wave 60: DAG evolution) ─────

[capabilities.branch]
method = "dag.branch"
domain = "dag.branch"
stability = "evolving"
description = "Create a named branch point in the DAG — fork session at a checkout vertex"

[capabilities.diff]
method = "dag.diff"
domain = "dag.diff"
stability = "evolving"
description = "Compute structural diff between two DAG session frontiers"

[capabilities.merge]
method = "dag.merge"
domain = "dag.merge"
stability = "evolving"
description = "Merge two or more DAG branches via multi-parent vertex (3-way merge semantics)"

[capabilities.federate]
method = "dag.federate"
domain = "dag.federate"
stability = "evolving"
description = "Replicate DAG state to/from a remote peer — diff-based partial federation"

# ── Partial dehydration (read-only Merkle root, session stays open) ──

[capabilities.partial_dehydrate]
method = "dag.partial_dehydrate"
domain = "dag.dehydration"
stability = "evolving"
description = "Compute Merkle root of current (or specified) vertices without closing the session"

# ── Dehydration (commit to permanent storage) ─────────────────────

[capabilities.dehydration_trigger]
method = "dag.dehydration.trigger"
domain = "dag.dehydration"
stability = "stable"
description = "Trigger dehydration of a session to permanent storage"

[capabilities.dehydration_status]
method = "dag.dehydration.status"
domain = "dag.dehydration"
stability = "stable"
description = "Check the status of a dehydration operation"

# ── Health and introspection ──────────────────────────────────────

[capabilities.health_check]
method = "health.check"
domain = "health"
stability = "stable"
description = "Service health check with status, version, and uptime"

[capabilities.health_liveness]
method = "health.liveness"
aliases = ["ping", "health"]
domain = "health"
stability = "stable"
description = "Zero-cost liveness probe (Kubernetes-compatible)"

[capabilities.health_readiness]
method = "health.readiness"
domain = "health"
stability = "stable"
description = "Readiness probe verifying store initialization and request acceptance"

[capabilities.health_metrics]
method = "health.metrics"
domain = "health"
stability = "stable"
description = "Operational metrics (sessions, vertices, latency, errors)"

[capabilities.identity_get]
method = "identity.get"
domain = "identity"
stability = "stable"
description = "Primal identity for biomeOS discovery (name, version, domain)"

[capabilities.capabilities_list]
method = "capabilities.list"
aliases = ["capability.list", "primal.capabilities"]
domain = "capabilities"
stability = "stable"
description = "List all capabilities this primal provides (biomeOS Format E)"

# ── MCP tool exposure (Squirrel AI coordination) ─────────────────

[capabilities.tools_list]
method = "tools.list"
aliases = ["mcp.tools.list"]
domain = "tools"
stability = "stable"
description = "List MCP tool definitions for AI agent coordination"

[capabilities.tools_call]
method = "tools.call"
aliases = ["mcp.tools.call"]
domain = "tools"
stability = "stable"
description = "Execute an MCP tool call dispatched by AI agents"

# ── Mesh trust events (cross-gate DAG recording, Wave 76c) ───────

[capabilities.mesh_events_record]
method = "mesh.events.record"
domain = "mesh"
stability = "evolving"
description = "Record a cross-gate trust event from bearDog into the DAG"

# ── Auth introspection (JH-0 method gate) ────────────────────────

[capabilities.auth_check]
method = "auth.check"
domain = "auth"
stability = "stable"
description = "Check caller authentication status and enforcement mode"

[capabilities.auth_mode]
method = "auth.mode"
domain = "auth"
stability = "stable"
description = "Current method gate enforcement mode (permissive/enforced)"

[capabilities.auth_peer_info]
method = "auth.peer_info"
domain = "auth"
stability = "stable"
description = "Connection origin and token status for the current caller"

# ── Wire-name aliases (GAP-36 resolution) ────────────────────────
#
# Downstream springs (primalSpring domain_contract_sweep, healthSpring
# Nest atomic) call `provenance.*` methods. rhizoCrypt's canonical
# domain is `dag`, but `provenance.*` is accepted as a wire-name alias
# and normalized to `dag.*` at dispatch time. Both are valid on the wire.
#
# Full alias table (provenance.* → dag.*):
#   provenance.session.create      → dag.session.create
#   provenance.session.get         → dag.session.get
#   provenance.session.list        → dag.session.list
#   provenance.session.discard     → dag.session.discard
#   provenance.event.append        → dag.event.append
#   provenance.event.append_batch  → dag.event.append_batch
#   provenance.vertex.get          → dag.vertex.get
#   provenance.vertex.query        → dag.vertex.query
#   provenance.vertex.children     → dag.vertex.children
#   provenance.frontier.get        → dag.frontier.get
#   provenance.genesis.get         → dag.genesis.get
#   provenance.merkle.root         → dag.merkle.root
#   provenance.merkle.proof        → dag.merkle.proof
#   provenance.merkle.verify       → dag.merkle.verify
#   provenance.slice.checkout      → dag.slice.checkout
#   provenance.slice.get           → dag.slice.get
#   provenance.slice.list          → dag.slice.list
#   provenance.slice.resolve       → dag.slice.resolve
#   provenance.dehydration.trigger → dag.dehydration.trigger
#   provenance.dehydration.status  → dag.dehydration.status
#   provenance.dehydrate           → dag.dehydrate (legacy)
#   provenance.partial_dehydrate   → dag.partial_dehydrate
#   provenance.branch              → dag.branch
#   provenance.diff                → dag.diff
#   provenance.merge               → dag.merge
#   provenance.federate            → dag.federate

# ===========================================================================
# Neural API Announce (outbound, Wave 43)
# ===========================================================================
# rhizoCrypt sends `primal.announce` to biomeOS on startup.
# This is NOT a served method — it is an outbound registration call.
#
# announce.capabilities    = ["dag", "integrity", "merkle"]
# announce.signal_tiers    = ["nest"]
# announce.cost_hints      = { dag = 10.0, integrity = 5.0, merkle = 8.0 }
# announce.latency_estimates = { dag = 15, integrity = 5, merkle = 10 }
# announce.semantic_mappings = <PROVENANCE_ALIASES from niche.rs>
